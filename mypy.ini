[mypy]
# CI runs `mypy . --ignore-missing-imports` from the repo root for a broad sweep.
# Each Python service owns a `tests/` package, so a root-level walk sees more than
# one module named `tests` and errors with "Duplicate module named". Each service
# already runs its own mypy with strict settings via its own pyproject.toml (e.g.
# `cd ml-signal-service && mypy src/`, `cd analytics-service && mypy src/`), so
# the root sweep can safely skip the per-service test packages and venvs.
exclude = (?x)(
    ^ml-signal-service/tests/
    | ^analytics-service/tests/
    | ^.*/\.venv/
    | ^.*/__pycache__/
  )
