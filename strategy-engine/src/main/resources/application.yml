server:
  port: 8082

spring:
  application:
    name: strategy-engine
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: strategy-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  jackson:
    serialization:
      write-dates-as-timestamps: false

strategy-engine:
  kafka:
    ticks-topic: market-data.ticks
    signals-topic: strategy.signals
  ml:
    host: ${ML_SERVICE_HOST:localhost}
    port: ${ML_SERVICE_PORT:50051}
    # FR-12 / TDD §5.2.2: high-confidence ML signals confirm or veto the strategy signal.
    confidence-threshold: 0.7
    # STRICT (default) suppresses contradictions; PERMISSIVE warns but proceeds; OFF disables.
    veto-mode: STRICT
    # When true a high-confidence NEUTRAL prediction also suppresses any sided signal.
    neutral-suppress: false
    # SCALED multiplies the strategy quantity by clamp(recommendedSize/sizingNeutralFraction, lower, upper)
    # when ML agrees with high confidence; NONE leaves quantity untouched.
    sizing-mode: NONE
    sizing-neutral-fraction: 0.20
    sizing-lower-bound: 0.50
    sizing-upper-bound: 1.50
  # FR-17 — regime-driven algorithm selection. Disabled by default to preserve manual control.
  # Set enabled=true to let GetRegime pick the strategy when confidence ≥ confidence-threshold.
  regime:
    enabled: false
    confidence-threshold: 0.6
    # Optional per-regime override of the built-in defaults (TRENDING_UP/DOWN → MOMENTUM,
    # MEAN_REVERTING/LOW_VOLATILITY → VWAP). Keys are MarketRegime enum names.
    map: {}
  # Roadmap 3.2.1 / 3.2.2 — Black-Scholes-Merton pricer + analytic Greeks.
  options:
    # Theta is reported per-day. 365 = calendar (Bloomberg OVME default); 252 = trading.
    theta-day-count: 365
    implied-vol-max-iterations: 100
    implied-vol-tolerance: 0.000001
    implied-vol-lower-bound: 0.0001
    implied-vol-upper-bound: 5.0
  # Issues 2.4.1 / 2.4.2 — inventory-aware + vol/ADV-relative RFQ pricing.
  rfq:
    base-spread-bps: 4.0
    inventory-lambda: 1.0
    inventory-neutral-notional: 1000000
    inventory-max-skew-bps: 30.0
    vol-scalar: 0.50
    adv-scalar: 0.30
    quote-validity-ms: 10000
    order-manager-base-url: ${ORDER_MANAGER_BASE_URL:http://localhost:8086}
    position-lookup-timeout-ms: 500
    volatility-window-size: 30
    reference-data:
      defaults:
        sector: UNKNOWN
        beta: 1.0
        adv: 0
      symbols:
        - symbol: AAPL
          sector: TECH
          beta: 1.20
          adv: 60000000
        - symbol: MSFT
          sector: TECH
          beta: 0.95
          adv: 25000000
        - symbol: GOOGL
          sector: TECH
          beta: 1.05
          adv: 25000000
        - symbol: AMZN
          sector: CONSUMER_DISCRETIONARY
          beta: 1.20
          adv: 45000000
        - symbol: TSLA
          sector: AUTOMOTIVE
          beta: 1.80
          adv: 90000000
        - symbol: NVDA
          sector: TECH
          beta: 1.65
          adv: 250000000

management:
  server:
    port: ${MANAGEMENT_PORT:8083}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
  metrics:
    tags:
      application: strategy-engine
    distribution:
      percentiles-histogram:
        mariaalpha.strategy.evaluation.duration.ms: true
        mariaalpha.strategy.ml.latency.ms: true
      percentiles:
        mariaalpha.strategy.evaluation.duration.ms: 0.5,0.95,0.99
        mariaalpha.strategy.ml.latency.ms: 0.5,0.95,0.99