spring:
  application:
    name: market-data-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:mariaalpha}
    username: ${POSTGRES_USER:mariaalpha}
    password: ${POSTGRES_PASSWORD:mariaalpha}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

market-data:
  kafka:
    ticks-topic: market-data.ticks

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: market-data-gateway