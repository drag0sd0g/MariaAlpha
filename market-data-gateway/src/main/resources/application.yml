server:
  port: ${MARKET_DATA_GATEWAY_PORT:8079}

spring:
  application:
    name: market-data-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:mariaalpha}
    username: ${POSTGRES_USER:mariaalpha}
    password: ${POSTGRES_PASSWORD:mariaalpha}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

market-data:
  kafka:
    ticks-topic: market-data.ticks

grpc:
  server:
    port: ${GRPC_SERVER_PORT:50052}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,tick
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
  metrics:
    tags:
      application: market-data-gateway
    distribution:
      percentiles-histogram:
        mariaalpha.md.tick.latency.ms: true
      percentiles:
        mariaalpha.md.tick.latency.ms: 0.5,0.95,0.99