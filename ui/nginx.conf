server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache for hashed filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path returns index.html so React Router can take over.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # REST proxy to api-gateway. The browser sends X-API-Key directly; we just forward.
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy to api-gateway for /ws/market-data, /ws/positions, /ws/orders, /ws/alerts.
    # Browsers cannot set custom headers on a WebSocket handshake, so the UI passes the API key
    # via the ?apiKey=... query parameter (accepted by api-gateway's ApiKeyAuthFilter).
    location /ws/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
