name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: snyk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  snyk-java:
    name: Snyk (Java dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Snyk test
        id: snyk
        uses: snyk/actions/gradle@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical --all-sub-projects

      - name: Upload Snyk SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

      - name: Fail on critical vulnerabilities
        if: steps.snyk.outcome == 'failure'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::Snyk skipped — SNYK_TOKEN secret not configured"
            exit 0
          fi
          echo "::error::Snyk found critical vulnerabilities in Java dependencies"
          exit 1

  snyk-python:
    name: Snyk (Python dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for requirements files
        id: detect
        run: |
          if find . -name 'requirements*.txt' -not -path './.git/*' | head -1 | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Python requirements files — skipping Snyk Python scan."
          fi

      - name: Snyk test
        if: steps.detect.outputs.found == 'true'
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical
