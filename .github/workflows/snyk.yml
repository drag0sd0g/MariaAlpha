name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: snyk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  snyk-java:
    name: Snyk (Java dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test
        id: snyk
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=critical --all-sub-projects --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        # Only upload when a SARIF was actually produced — on free-tier quota
        # exhaustion Snyk exits non-zero before writing the file.
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

      # Advisory only: findings surface as a warning annotation and in the
      # Security tab (via the SARIF upload), but never fail the build. This also
      # tolerates the free-tier "monthly limit of private tests" error, which
      # otherwise made the step exit non-zero for a non-vulnerability reason.
      - name: Report Snyk findings (non-blocking)
        if: steps.snyk.outcome == 'failure'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::Snyk skipped — SNYK_TOKEN secret not configured"
          else
            echo "::warning::Snyk reported critical Java vulnerabilities or hit the test-quota limit — see the step log and the Security tab."
          fi

  snyk-python:
    name: Snyk (Python dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for requirements files
        id: detect
        run: |
          if find . -name 'requirements*.txt' -not -path './.git/*' | head -1 | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Python requirements files — skipping Snyk Python scan."
          fi

      - name: Install Snyk CLI
        if: steps.detect.outputs.found == 'true'
        run: npm install -g snyk

      - name: Snyk test
        if: steps.detect.outputs.found == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=critical --file=requirements.txt
