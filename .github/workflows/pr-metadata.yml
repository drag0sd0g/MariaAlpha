name: PR Metadata

on:
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  populate:
    name: Auto-populate PR metadata
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
    steps:
      - name: Apply metadata from linked issues
        run: |
          PR=${{ github.event.pull_request.number }}
          TITLE="${{ github.event.pull_request.title }}"
          REPO=${{ github.repository }}

          for REF in $(echo "$TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+'); do
            ISSUE=$(gh issue list -R "$REPO" --search "\"[${REF}]\" in:title" --json number --jq '.[0].number' 2>/dev/null)
            [ -z "$ISSUE" ] && continue

            LABELS=$(gh issue view "$ISSUE" -R "$REPO" --json labels --jq '[.labels[].name] | join(",")')
            [ -n "$LABELS" ] && gh pr edit "$PR" -R "$REPO" --add-label "$LABELS"

            MS=$(gh issue view "$ISSUE" -R "$REPO" --json milestone --jq '.milestone.title // empty')
            [ -n "$MS" ] && gh pr edit "$PR" -R "$REPO" --milestone "$MS"
          done

          gh pr edit "$PR" -R "$REPO" --add-assignee drag0sd0g
          gh pr edit "$PR" -R "$REPO" --add-project MariaAlpha || true
