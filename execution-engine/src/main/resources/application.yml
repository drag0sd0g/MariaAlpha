server:
  port: 8084

spring:
  application:
    name: execution-engine
  profiles:
    active: simulated
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 200ms
      connect-timeout: 500ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: execution-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  jackson:
    serialization:
      write-dates-as-timestamps: false

execution-engine:
  kafka:
    signals-topic: strategy.signals
    market-data-topic: market-data.ticks
    orders-lifecycle-topic: orders.lifecycle
    routing-decisions-topic: routing.decisions
    risk-alerts-topic: analytics.risk-alerts
  # Redis position cache. Reader-side: warms PositionTracker on startup
  # from Redis and applies pub/sub updates from order-manager. Disable to fall back to the
  # in-memory tracker only (no cross-service position visibility).
  redis:
    enabled: true
    position-key-prefix: "mariaalpha:position:"
    positions-pub-sub-channel: "mariaalpha.positions.updates"
  risk:
    max-order-notional: 100000
    max-position-per-symbol: 500000
    max-portfolio-exposure: 2000000
    max-open-orders: 50
    max-daily-loss: 25000
    # Sector / beta / ADV-participation pre-trade checks
    sector-exposure-limits:
      TECH: 1500000
      AUTOMOTIVE: 750000
      UNKNOWN: 250000
    default-sector-exposure-limit: 1000000
    max-absolute-beta-weighted-exposure: 2500000
    max-adv-participation: 0.10
    reference-data:
      # The MVP simulator universe — sector / beta / ADV per ticker. Production deployments would
      # back this with a periodic refresh from a vendor (e.g. Bloomberg FLDS, Refinitiv RDP).
      defaults:
        sector: UNKNOWN
        beta: 1.0
        adv: 0
      symbols:
        - symbol: AAPL
          sector: TECH
          beta: 1.20
          adv: 60000000
        - symbol: MSFT
          sector: TECH
          beta: 0.95
          adv: 25000000
        - symbol: GOOGL
          sector: TECH
          beta: 1.05
          adv: 25000000
        - symbol: AMZN
          sector: CONSUMER_DISCRETIONARY
          beta: 1.20
          adv: 45000000
        - symbol: TSLA
          sector: AUTOMOTIVE
          beta: 1.80
          adv: 90000000
        - symbol: NVDA
          sector: TECH
          beta: 1.65
          adv: 250000000
  sor:
    mode: ${EXECUTION_ENGINE_SOR_MODE:scored}
    max-latency-ms: 200
    max-fee-bps: 10
    max-price-improvement-bps: 5
    decision-cache-size: 1000
    weights:
      price-improvement: 0.25
      liquidity: 0.25
      latency: 0.10
      fees: 0.15
      information-leakage: 0.25
    venues:
      - name: PRIMARY
        type: LIT
        avg-latency-ms: 50
        taker-fee-bps: 3
        maker-rebate-bps: 2
        leakage-score: 1.0
        top-of-book-size: 10000
        fill-rate: 0.95
        adapter-bean: primary
        enabled: true
      - name: DARK_POOL_A
        type: DARK
        avg-latency-ms: 30
        taker-fee-bps: 1
        maker-rebate-bps: 0
        leakage-score: 0.20
        top-of-book-size: 0
        fill-rate: 0.40
        adapter-bean: dark-pool-a
        enabled: false
      - name: INTERNAL_CROSS
        type: INTERNAL
        avg-latency-ms: 1
        taker-fee-bps: 0
        maker-rebate-bps: 0
        leakage-score: 0.0
        top-of-book-size: 0
        fill-rate: 0.60
        adapter-bean: internal-cross
        enabled: false
  dark-pool:
    venue: DARK_POOL_A
    tick-interval-ms: 100
    match-probability-per-tick: 0.10
    min-spread-bps: 1
    fill-latency-ms: 30
    partial-fill-ratio: 0.5
    max-pending: 1000
    seed: -1 # -1 = unseeded (production)
  internal-crossing:
    venue: INTERNAL_CROSS
    cross-probability-on-submit: 0.6
    tick-interval-ms: 50
    match-probability-per-tick: 0.30
    fill-latency-ms: 1
    max-pending: 1000
    seed: -1
  # Roadmap 3.2.3 — PEGGED order-type module.
  pegged:
    # Minimum bps move in the reference price (vs the previously-submitted child price) that
    # triggers a cancel-and-resubmit of the LIMIT child. 0 = re-peg on every tick (chatty).
    repeg-threshold-bps: 5
    # Hard cap on |pegOffsetBps| — protects against typo-induced runaway pricing.
    max-offset-bps: 100

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
  show-actuator: false

management:
  server:
    port: ${MANAGEMENT_PORT:8085}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
    # Redis cache is non-critical (in-memory PositionTracker stays usable on failure).
    redis:
      enabled: true
  metrics:
    tags:
      application: execution-engine
    distribution:
      percentiles-histogram:
        mariaalpha.execution.order.latency.ms: true
        mariaalpha.execution.risk.check.duration.ms: true
        mariaalpha.execution.sor.scoring.duration.ms: true
      percentiles:
        mariaalpha.execution.order.latency.ms: 0.5,0.95,0.99
        mariaalpha.execution.risk.check.duration.ms: 0.5,0.95,0.99
        mariaalpha.execution.sor.scoring.duration.ms: 0.5,0.95,0.99