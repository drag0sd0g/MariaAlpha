server:
  port: 8084

spring:
  application:
    name: execution-engine
  profiles:
    active: simulated
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: execution-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  jackson:
    serialization:
      write-dates-as-timestamps: false

execution-engine:
  kafka:
    signals-topic: strategy.signals
    market-data-topic: market-data.ticks
    orders-lifecycle-topic: orders.lifecycle
    routing-decisions-topic: routing.decisions
    risk-alerts-topic: analytics.risk-alerts
  risk:
    max-order-notional: 100000
    max-position-per-symbol: 500000
    max-portfolio-exposure: 2000000
    max-open-orders: 50
    max-daily-loss: 25000
  sor:
    mode: ${EXECUTION_ENGINE_SOR_MODE:scored}
    max-latency-ms: 200
    max-fee-bps: 10
    max-price-improvement-bps: 5
    decision-cache-size: 1000
    weights:
      price-improvement: 0.25
      liquidity: 0.25
      latency: 0.10
      fees: 0.15
      information-leakage: 0.25
    venues:
      - name: PRIMARY
        type: LIT
        avg-latency-ms: 50
        taker-fee-bps: 3
        maker-rebate-bps: 2
        leakage-score: 1.0
        top-of-book-size: 10000
        fill-rate: 0.95
        adapter-bean: primary
        enabled: true
      - name: DARK_POOL_A
        type: DARK
        avg-latency-ms: 30
        taker-fee-bps: 1
        maker-rebate-bps: 0
        leakage-score: 0.20
        top-of-book-size: 0
        fill-rate: 0.40
        adapter-bean: dark-pool-a
        enabled: false
      - name: INTERNAL_CROSS
        type: INTERNAL
        avg-latency-ms: 1
        taker-fee-bps: 0
        maker-rebate-bps: 0
        leakage-score: 0.0
        top-of-book-size: 0
        fill-rate: 0.60
        adapter-bean: internal-cross
        enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
  show-actuator: false

management:
  server:
    port: ${MANAGEMENT_PORT:8085}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
  metrics:
    tags:
      application: execution-engine
    distribution:
      percentiles-histogram:
        mariaalpha.execution.order.latency.ms: true
        mariaalpha.execution.risk.check.duration.ms: true
        mariaalpha.execution.sor.scoring.duration.ms: true
      percentiles:
        mariaalpha.execution.order.latency.ms: 0.5,0.95,0.99
        mariaalpha.execution.risk.check.duration.ms: 0.5,0.95,0.99
        mariaalpha.execution.sor.scoring.duration.ms: 0.5,0.95,0.99