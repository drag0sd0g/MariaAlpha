execution-engine:
  simulated:
    fill-latency-ms: 50
    slippage-bps: 2
    partial-fill-ratio: 1.0
    venue: SIMULATED
  # Tighten the simulated internal-crossing knobs so every submitted order receives a
  # synthetic counterparty immediately. The stochastic 0.6/0.30 defaults from application.yml
  # are realistic for prod-like load-testing but cause e2e flakes: under background contention
  # (e.g. a stateful strategy oscillating on another symbol), a 100-share VWAP child can sit
  # in the queue past the 40-60 s await timeout. The probabilistic behaviour is still covered
  # by InternalCrossingEngineTest and the integration test, both of which drive the engine
  # directly without going through this profile.
  internal-crossing:
    cross-probability-on-submit: 1.0
    match-probability-per-tick: 1.0
    tick-interval-ms: 20
    fill-latency-ms: 1
  sor:
    venues:
      - name: SIMULATED
        type: LIT
        avg-latency-ms: 50
        taker-fee-bps: 0
        maker-rebate-bps: 0
        leakage-score: 1.0
        top-of-book-size: 10000
        fill-rate: 1.0
        adapter-bean: primary
        enabled: true
      - name: DARK_POOL_A
        type: DARK
        avg-latency-ms: 30
        taker-fee-bps: 1
        maker-rebate-bps: 0
        leakage-score: 0.20
        top-of-book-size: 0
        fill-rate: 0.40
        adapter-bean: dark-pool-a
        enabled: true
      - name: INTERNAL_CROSS
        type: INTERNAL
        avg-latency-ms: 1
        taker-fee-bps: 0
        maker-rebate-bps: 0
        leakage-score: 0.0
        top-of-book-size: 0
        fill-rate: 0.60
        adapter-bean: internal-cross
        enabled: true