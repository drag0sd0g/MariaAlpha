server:
  port: 8086

spring:
  application:
    name: order-manager
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 200ms
      connect-timeout: 500ms
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mariaalpha}
    username: ${POSTGRES_USER:mariaalpha}
    password: ${POSTGRES_PASSWORD:mariaalpha}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-manager
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  jackson:
    serialization:
      write-dates-as-timestamps: false

order-manager:
  kafka:
    orders-lifecycle-topic: orders.lifecycle
    market-data-topic: market-data.ticks
    positions-updates-topic: positions.updates
  portfolio:
    initial-cash: 1000000.00
  # Currency reference data for /api/portfolio/currency-exposure (roadmap 3.5.3).
  # All simulator symbols are USD-denominated; overrides ship dormant so a Phase 3 IBKR
  # adapter (3.1.x) or a TSE-listed symbol (3.3.x) can be added by config alone.
  currency:
    default-currency: USD
    known: [USD, EUR, JPY, GBP]
    overrides: {}
  # Distributed position cache. Disable with order-manager.redis.enabled=false
  # to run without a Redis instance — Kafka remains authoritative for downstream consumers.
  redis:
    enabled: true
    position-key-prefix: "mariaalpha:position:"
    positions-pub-sub-channel: "mariaalpha.positions.updates"
    position-ttl: PT24H

management:
  server:
    port: ${MANAGEMENT_PORT:8087}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
    # Redis cache is non-critical (Kafka remains authoritative). Surface its status in
    # /actuator/health but keep it out of the readiness probe so a momentary Redis hiccup
    # does not flap pod readiness.
    redis:
      enabled: true
  metrics:
    tags:
      application: order-manager
    distribution:
      percentiles-histogram:
        mariaalpha.orders.persist.duration.ms: true
      percentiles:
        mariaalpha.orders.persist.duration.ms: 0.5,0.95,0.99