databaseChangeLog:
  - changeSet:
      id: order-manager-002-create-fills
      author: mariaalpha
      changes:
        - createTable:
            tableName: fills
            columns:
              - column:
                  name: fill_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_fills
              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fills_order_id
                    references: orders(order_id)
              - column:
                  name: symbol
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: side
                  type: varchar(4)
                  constraints:
                    nullable: false
              - column:
                  name: fill_price
                  type: decimal(18,8)
                  constraints:
                    nullable: false
              - column:
                  name: fill_quantity
                  type: decimal(18,8)
                  constraints:
                    nullable: false
              - column:
                  name: commission
                  type: decimal(18,8)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: venue
                  type: varchar(32)
              - column:
                  name: exchange_fill_id
                  type: varchar(64)
              - column:
                  name: filled_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_fills_order_id
            tableName: fills
            columns:
              - column:
                  name: order_id
        - createIndex:
            indexName: idx_fills_symbol
            tableName: fills
            columns:
              - column:
                  name: symbol
        - createIndex:
            indexName: idx_fills_filled_at
            tableName: fills
            columns:
              - column:
                  name: filled_at
