{{- if not .Values.secrets.useSealedSecrets }}
# Plain Secret resources rendered from values. For production, set
# secrets.useSealedSecrets=true and commit SealedSecret manifests under
# sealed-secrets/ (loaded by sealed-secrets-loader.yaml).
---
apiVersion: v1
kind: Secret
metadata:
  name: alpaca-credentials
  namespace: {{ include "mariaalpha.appNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  ALPACA_API_KEY_ID: {{ .Values.secrets.alpacaApiKeyId | quote }}
  ALPACA_API_SECRET_KEY: {{ .Values.secrets.alpacaApiSecretKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mariaalpha-api-key
  namespace: {{ include "mariaalpha.appNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  MARIAALPHA_API_KEY: {{ .Values.secrets.mariaalphaApiKey | quote }}
---
# Postgres password — Bitnami's postgresql chart reads from this secret in the
# data namespace via global.postgresql.auth.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ include "mariaalpha.dataNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
---
# Same password in the app namespace so the Java services can mount it.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-credentials
  namespace: {{ include "mariaalpha.appNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
{{- if (index .Values "prometheus-stack" "enabled") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: {{ include "mariaalpha.o11yNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.secrets.grafanaAdminUser | quote }}
  admin-password: {{ .Values.secrets.grafanaAdminPassword | quote }}
{{- end }}
{{- end }}
