apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-actuator-health"
  namespace: {{ include "mariaalpha.appNamespace" . }}
  labels:
    {{- include "mariaalpha.commonLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -e
          fail=0
          for svc in \
            api-gateway:8091 \
            market-data-gateway:8081 \
            strategy-engine:8083 \
            execution-engine:8085 \
            order-manager:8087 \
            post-trade:8089; do
            echo -n "checking $svc ... "
            if curl -fsS --max-time 5 "http://${svc}/actuator/health/liveness" > /dev/null; then
              echo OK
            else
              echo FAIL
              fail=1
            fi
          done

          echo -n "checking ml-signal-service:8090/health ... "
          if curl -fsS --max-time 5 http://ml-signal-service:8090/health > /dev/null; then echo OK; else echo FAIL; fail=1; fi

          echo -n "checking ui:80/ ... "
          if curl -fsS --max-time 5 http://ui:80/ > /dev/null; then echo OK; else echo FAIL; fail=1; fi

          if [ "$fail" -ne 0 ]; then
            echo "One or more services failed health check"
            exit 1
          fi
          echo "All services healthy"
