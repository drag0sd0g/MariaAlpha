{{- if .Values.secrets.useSealedSecrets }}
# Range-load every file under sealed-secrets/ as a manifest. The directory
# must contain SealedSecret manifests already sealed against this cluster's
# sealed-secrets controller (see docs/runbooks/helm-rotate-secrets.md).
{{- range $path, $_ := .Files.Glob "sealed-secrets/*.yaml" }}
---
{{ $.Files.Get $path }}
{{- end }}
{{- end }}
