apiVersion: v2
name: mariaalpha
description: Maria Alpha trading platform — umbrella chart for full Kubernetes deployment.
type: application
version: 0.1.0
appVersion: "0.2.4"
kubeVersion: ">=1.28.0-0"

maintainers:
  - name: drag0sd0g
    url: https://github.com/drag0sd0g/MariaAlpha

dependencies:
  # --- Local subcharts ---
  - name: api-gateway
    version: "0.1.0"
    repository: "file://charts/api-gateway"
    condition: api-gateway.enabled
  - name: market-data-gateway
    version: "0.1.0"
    repository: "file://charts/market-data-gateway"
    condition: market-data-gateway.enabled
  - name: strategy-engine
    version: "0.1.0"
    repository: "file://charts/strategy-engine"
    condition: strategy-engine.enabled
  - name: execution-engine
    version: "0.1.0"
    repository: "file://charts/execution-engine"
    condition: execution-engine.enabled
  - name: order-manager
    version: "0.1.0"
    repository: "file://charts/order-manager"
    condition: order-manager.enabled
  - name: post-trade
    version: "0.1.0"
    repository: "file://charts/post-trade"
    condition: post-trade.enabled
  - name: ml-signal-service
    version: "0.1.0"
    repository: "file://charts/ml-signal-service"
    condition: ml-signal-service.enabled
  - name: ui
    version: "0.1.0"
    repository: "file://charts/ui"
    condition: ui.enabled
  - name: kafka-topics-init
    version: "0.1.0"
    repository: "file://charts/kafka-topics-init"
    condition: kafka-topics-init.enabled

  # --- External chart deps ---
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: kafka
    version: "30.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  # Redis distributed position cache.
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kube-prometheus-stack
    version: "65.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus-stack
    condition: prometheus-stack.enabled
  - name: loki
    version: "6.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: tempo
    version: "1.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
  - name: alloy
    version: "0.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
  - name: ingress-nginx
    version: "4.x.x"
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: cert-manager
    version: "v1.x.x"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  # The legacy HTTP chart repo (bitnami-labs.github.io/sealed-secrets) was retired; the
  # chart is now distributed via OCI. For OCI deps `repository` is the registry path and
  # the chart name is appended from `name`, i.e. oci://registry-1.docker.io/bitnamicharts/sealed-secrets.
  - name: sealed-secrets
    version: "2.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: sealed-secrets.enabled
