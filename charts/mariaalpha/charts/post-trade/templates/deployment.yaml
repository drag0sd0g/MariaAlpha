apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-trade
  namespace: {{ .Values.global.appNamespace | default "mariaalpha" }}
  labels:
    {{- include "post-trade.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      {{- include "post-trade.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "post-trade.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: post-trade
          image: {{ include "post-trade.image" . | quote }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: app
              containerPort: {{ .Values.service.appPort }}
            - name: management
              containerPort: {{ .Values.service.managementPort }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.springProfilesActive | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.mariaalpha-data.svc.cluster.local:9092"
            - name: MANAGEMENT_PORT
              value: "{{ .Values.service.managementPort }}"
            - { name: POSTGRES_HOST, value: "postgresql.mariaalpha-data.svc.cluster.local" }
            - { name: POSTGRES_PORT, value: "5432" }
            - { name: POSTGRES_DB,   value: "mariaalpha" }
            - { name: POSTGRES_USER, value: "mariaalpha" }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app-credentials
                  key: postgres-password
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgresql.mariaalpha-data.svc.cluster.local:5432/mariaalpha" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "mariaalpha" }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app-credentials
                  key: postgres-password
            - { name: SPRING_LIQUIBASE_LIQUIBASE_SCHEMA, value: "liq_pt" }
            - { name: ORDER_MANAGER_BASE_URL, value: "http://order-manager:8086" }
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: management }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: management }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: management }
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
