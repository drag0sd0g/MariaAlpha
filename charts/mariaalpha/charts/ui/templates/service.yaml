apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ .Values.global.appNamespace | default "mariaalpha" }}
  labels:
    {{- include "ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ui.selectorLabels" . | nindent 4 }}
