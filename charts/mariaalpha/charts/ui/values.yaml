replicaCount: 1

image:
  tag: ""

service:
  type: ClusterIP
  port: 80

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 250m, memory: 256Mi }

## The nginx:alpine image expects to run as root so it can chown its cache dir
## then drop to the `nginx` user. Don't pin runAsUser here.
podSecurityContext: {}
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
  readOnlyRootFilesystem: false
