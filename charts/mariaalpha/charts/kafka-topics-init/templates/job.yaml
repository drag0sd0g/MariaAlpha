apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: {{ .Values.global.dataNamespace | default "mariaalpha-data" }}
  labels:
    app.kubernetes.io/name: kafka-topics-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mariaalpha
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topics-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: mariaalpha
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              echo "Waiting for {{ .Values.kafkaBootstrap }} to accept TCP";
              host=$(echo {{ .Values.kafkaBootstrap }} | cut -d: -f1);
              port=$(echo {{ .Values.kafkaBootstrap }} | cut -d: -f2);
              until nc -z "$host" "$port"; do echo "not ready"; sleep 2; done;
              echo "kafka reachable";
      containers:
        - name: create-topics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "/opt/kafka/create-topics.sh"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVER
              value: {{ .Values.kafkaBootstrap | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: script
              mountPath: /opt/kafka/create-topics.sh
              subPath: create-topics.sh
      volumes:
        - name: script
          configMap:
            name: kafka-topics-init-script
            defaultMode: 0755
            items:
              - key: create-topics.sh
                path: create-topics.sh
