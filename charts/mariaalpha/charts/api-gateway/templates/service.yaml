apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.global.appNamespace | default "mariaalpha" }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.appPort }}
      targetPort: app
      protocol: TCP
    - name: management
      port: {{ .Values.service.managementPort }}
      targetPort: management
      protocol: TCP
  selector:
    {{- include "api-gateway.selectorLabels" . | nindent 4 }}
