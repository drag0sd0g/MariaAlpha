apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
  namespace: {{ .Values.global.appNamespace | default "mariaalpha" }}
  labels:
    {{- include "strategy-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      {{- include "strategy-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "strategy-engine.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: strategy-engine
          image: {{ include "strategy-engine.image" . | quote }}
          imagePullPolicy: {{ .Values.global.images.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: app
              containerPort: {{ .Values.service.appPort }}
            - name: management
              containerPort: {{ .Values.service.managementPort }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.mariaalpha-data.svc.cluster.local:9092"
            - name: MANAGEMENT_PORT
              value: "{{ .Values.service.managementPort }}"
            - { name: ML_SERVICE_HOST, value: "ml-signal-service" }
            - { name: ML_SERVICE_PORT, value: "50051" }
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: management }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: management }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: management }
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
