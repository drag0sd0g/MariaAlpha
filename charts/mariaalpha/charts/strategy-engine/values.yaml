replicaCount: 1

image:
  tag: ""

service:
  type: ClusterIP
  appPort: 8082
  managementPort: 8083

resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits:   { cpu: 1000m, memory: 1Gi }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false

serviceMonitor:
  enabled: true
  interval: 15s

extraEnv: []
