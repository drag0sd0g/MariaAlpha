# Run e2e test classes in a deterministic order. The shared docker-compose stack
# (SharedComposeStack) is JVM-global, but Phase2RiskChecksE2ETest forcibly tears it down to start
# its own stack with a tighter ADV-participation override. Forcing Phase2 to run last via @Order
# means the four shared-stack classes complete first, then Phase2 takes over the host's compose
# bindings on its own terms.
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$OrderAnnotation
