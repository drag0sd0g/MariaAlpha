server:
  port: 8088

spring:
  application:
    name: post-trade
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mariaalpha}
    username: ${POSTGRES_USER:mariaalpha}
    password: ${POSTGRES_PASSWORD:mariaalpha}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: post-trade
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  jackson:
    serialization:
      write-dates-as-timestamps: false

post-trade:
  kafka:
    orders-lifecycle-topic: orders.lifecycle
    market-data-topic: market-data.ticks
    analytics-tca-topic: analytics.tca
  tca:
    market-data-cache-ttl-seconds: 21600
    market-data-cache-max-ticks-per-symbol: 20000
    arrival-snapshot-max-lookback-seconds: 60
    order-manager-base-url: ${ORDER_MANAGER_BASE_URL:http://localhost:8086}
    order-manager-http-timeout-ms: 2000

management:
  server:
    port: ${MANAGEMENT_PORT:8089}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    kafka:
      enabled: true
  metrics:
    tags:
      application: post-trade
    distribution:
      percentiles-histogram:
        mariaalpha.tca.slippage.bps: true
        mariaalpha.tca.computation.duration.ms: true
      percentiles:
        mariaalpha.tca.slippage.bps: 0.5,0.95,0.99
